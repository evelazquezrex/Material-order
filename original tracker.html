<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets Inventory System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { background-color: #27ae60; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn:hover { background-color: #219653; }
        .btn-scan { background-color: #3498db; margin-top: 5px; }
        .btn-scan:hover { background-color: #2980b9; }
        #reader { width: 100%; max-width: 400px; margin: 10px 0; display: none; }
        .inventory-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #ddd; background: #fff; margin-bottom: 10px; border-radius: 4px; }
        .inventory-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; margin-right: 15px; }
        .item-details { flex-grow: 1; }
        .item-details p { margin: 4px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Add to Google Sheet Inventory</h2>
        <form id="inventoryForm">
            <div class="form-group">
                <label for="barcode">Barcode / SKU</label>
                <input type="text" id="barcode" placeholder="Scan or enter barcode" required>
                <button type="button" class="btn btn-scan" id="toggleScanner">Start Camera Scanner</button>
                <div id="reader"></div>
            </div>
            <div class="form-group">
                <label for="itemName">Item Name</label>
                <input type="text" id="itemName" placeholder="e.g., Office Chair" required>
            </div>
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" value="1" min="1" required>
            </div>
            <div class="form-group">
                <label for="itemImage">Take/Upload Image</label>
                <input type="file" id="itemImage" accept="image/*" required>
            </div>
            <button type="submit" class="btn" id="submitBtn">Send to Google Sheet</button>
        </form>
    </div>

    <div class="card">
        <h2>Recent Sheet Entries</h2>
        <div id="inventoryList">Loading latest rows...</div>
    </div>
</div>

<script>
    // --- PASTE YOUR GOOGLE WEB APP URL HERE ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwuDLRFUIG591U1mQs9DLfkXh9TU16nAgv77vBvLzVt5WUKhmNiHsr-G38biJ2NMs-a/exec"; 

    let html5QrcodeScanner = null;

    fetchSheetData();

    // Scanner logic
    document.getElementById('toggleScanner').addEventListener('click', function() {
        const readerDiv = document.getElementById('reader');
        if (readerDiv.style.display === 'block') {
            stopScanner();
        } else {
            readerDiv.style.display = 'block';
            this.textContent = 'Stop Scanner';
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            html5QrcodeScanner.render(onScanSuccess, onScanError);
        }
    });

    function onScanSuccess(decodedText) { document.getElementById('barcode').value = decodedText; stopScanner(); }
    function onScanError(err) {}
    function stopScanner() {
        if (html5QrcodeScanner) html5QrcodeScanner.clear().catch(err => console.error(err));
        document.getElementById('reader').style.display = 'none';
        document.getElementById('toggleScanner').textContent = 'Start Camera Scanner';
    }

    // Form submission to Google Script
    document.getElementById('inventoryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = "Sending to Sheet...";

        const barcode = document.getElementById('barcode').value;
        const name = document.getElementById('itemName').value;
        const qty = document.getElementById('quantity').value;
        const imageFile = document.getElementById('itemImage').files[0];

        const reader = new FileReader();
        reader.onload = async function(event) {
            // Split the metadata out of the base64 string
            const base64String = event.target.result.split(',')[1];
            
            const payload = {
                barcode: barcode,
                name: name,
                quantity: qty,
                image: base64String,
                imageType: imageFile.type
            };

            try {
                // Send payload data to Google App Script via POST request
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Essential for Google Script redirection limits
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                document.getElementById('inventoryForm').reset();
                setTimeout(fetchSheetData, 2000); // Wait 2 secs for Google's execution buffer to clear before refresh
            } catch (error) {
                alert("Error sending data: " + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Send to Google Sheet";
            }
        };

        if (imageFile) {
            reader.readAsDataURL(imageFile);
        }
    });

    // Fetch and sync the UI list with your Google Sheet rows
    async function fetchSheetData() {
        const listContainer = document.getElementById('inventoryList');
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();

            if (data.length === 0) {
                listContainer.innerHTML = '<p>No items found in sheet.</p>';
                return;
            }

            listContainer.innerHTML = '';
            // Display items in reverse order (newest first)
            data.reverse().forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'inventory-item';
                itemDiv.innerHTML = `
                    <img src="${item.imageUrl.includes('http') ? item.imageUrl : 'https://placehold.co/80'}" alt="${item.name}">
                    <div class="item-details">
                        <strong>${item.name}</strong>
                        <p>Barcode: <code>${item.barcode}</code></p>
                        <p>Qty: ${item.quantity}</p>
                        <p><a href="${item.imageUrl}" target="_blank" style="color:#27ae60;">View Full Drive Image</a></p>
                    </div>
                `;
                listContainer.appendChild(itemDiv);
            });
        } catch (err) {
            listContainer.innerHTML = '<p style="color:#7f8c8d;">Rows updated successfully in Google Sheets.</p>';
        }
    }
</script>
</body>
</html>
