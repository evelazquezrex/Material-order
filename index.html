<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Sheets Inventory System</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 15px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #2c3e50; font-size: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="file"], select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        .btn { background-color: #27ae60; color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        .btn:disabled { background-color: #95a5a6; }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: white; padding: 20px; border-radius: 12px; max-width: 400px; width: 85%; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-yes { background-color: #27ae60; color: white; }
        .btn-no { background-color: #e74c3c; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Add to Google Sheet Inventory</h2>
        <form id="inventoryForm">
            <div class="form-group">
                <label for="userSelect">User</label>
                <select id="userSelect" name="userSelect" required>
                    <option value="" disabled selected>Select User</option>
                    <option value="RM-104">RM-104</option>
                    <option value="EV-100">EV-100</option>
                    <option value="PF-103">PF-103</option>
                </select>
            </div>

            <div class="form-group">
                <label for="barcodeImage">Take/Upload Barcode Photo</label>
                <input type="file" id="barcodeImage" name="barcodeImage" accept="image/*">
            </div>

            <div class="form-group">
                <label for="itemName">Item Name</label>
                <input type="text" id="itemName" name="itemName" placeholder="e.g., Conduit" required>
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" placeholder="e.g., Student Center" required>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" value="1" min="1" required>
            </div>

            <div class="form-group">
                <label for="itemImage">Take/Upload Item Photo</label>
                <input type="file" id="itemImage" name="itemImage" accept="image/*">
            </div>

            <button type="submit" class="btn" id="submitBtn">Send to Google Sheet</button>
        </form>
    </div>
</div>

<!-- Confirmation Modal -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
        <p style="font-size: 16px; margin: 0;">An image was not submitted, Continue?</p>
        <div class="modal-buttons">
            <button class="modal-btn btn-yes" id="confirmYes">YES</button>
            <button class="modal-btn btn-no" id="confirmNo">NO</button>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz5u7Hf2d7EqHiTAIE-mczyHonFGmlKVY_vDJVi9oSUR_qUR8kGL9yc9rgB-IAsNu-m/exec"; 
    			
    // Base64 encoded image of a red "X"
    const NO_IMAGE_X_BASE64 = "iVBORw0KGgoAAAANSUhEUgAAAGAAAABgCAYAAADimHc4AAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAACiSURBVHhe7c4BDQAwAASh+zd9TYE/OAw2wS4ZE1OqAFAqAJQKAKUCQKkAUCoAlAoApQJAqQBQKgCUCgClAkCpAFAqAJQKAKUCQKkAUCoAlAoApQJAqQBQKgCUCgClAkCpAFAqAJQKAKUCQKkAUCoAlAoApQJAqQBQKgCUCgClAkCpAFAqAJQKAKUCQKkAUCoAlAoApQJAqQBQKgCUCgClAkCpAFAmBvwB3QByL033E60AAAAASUVORK5CYII=";

    // iPad Image Resizer to prevent Safari Base64 Memory Crashes
    function compressImage(file, maxWidth = 1000) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    resolve(dataUrl.split(',')[1]); 
                };
                img.onerror = (err) => reject(err);
            };
            reader.onerror = (err) => reject(err);
        });
    }

    // Custom YES/NO Prompt Handler
    function askYesNo() {
        return new Promise((resolve) => {
            const modal = document.getElementById('confirmModal');
            const yesBtn = document.getElementById('confirmYes');
            const noBtn = document.getElementById('confirmNo');

            modal.style.display = 'flex';

            yesBtn.onclick = () => {
                modal.style.display = 'none';
                resolve(true);
            };

            noBtn.onclick = () => {
                modal.style.display = 'none';
                resolve(false);
            };
        });
    }

    // Submit handler
    document.getElementById('inventoryForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const barcodeImageFile = document.getElementById('barcodeImage').files[0];
        const itemImageFile = document.getElementById('itemImage').files[0];

        // Prompt if either image is missing
        if (!barcodeImageFile || !itemImageFile) {
            const userChoice = await askYesNo();
            if (!userChoice) {
                return; // User selected NO, continue accepting info
            }
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = "Processing & Sending...";

        const selectedUser = document.getElementById('userSelect').value;
        const name = document.getElementById('itemName').value;
        const location = document.getElementById('location').value;
        const qty = document.getElementById('quantity').value;

        try {
            // Compress image files if present, otherwise pass the "X" image base64
            const base64BarcodeImage = barcodeImageFile ? await compressImage(barcodeImageFile, 1000) : NO_IMAGE_X_BASE64;
            const base64ItemImage = itemImageFile ? await compressImage(itemImageFile, 1000) : NO_IMAGE_X_BASE64;
            
            const payload = {
                user: selectedUser,
                barcodeImage: base64BarcodeImage,
                name: name,
                location: location,
                quantity: qty,
                image: base64ItemImage,
                imageType: "image/jpeg"
            };

            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            document.getElementById('inventoryForm').reset();
            alert("Item sent to Google Sheet!");
        } catch (error) {
            alert("Upload Error: " + error.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Send to Google Sheet";
        }
    });
</script>
</body>
</html>
