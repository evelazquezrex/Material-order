<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Sheets Inventory System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 15px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #2c3e50; font-size: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        .btn { background-color: #27ae60; color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        .btn:disabled { background-color: #95a5a6; }
        .barcode-upload-box { background: #f8f9fa; border: 1px dashed #bdc3c7; padding: 12px; border-radius: 8px; margin-top: 8px; }
        .inventory-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 8px; border-radius: 8px; }
        .inventory-item img { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; margin-right: 12px; }
        .item-details p { margin: 3px 0; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Add to Google Sheet Inventory</h2>
        <form id="inventoryForm">
            <div class="form-group">
                <label for="barcode">Barcode / SKU</label>
                <input type="text" id="barcode" name="barcode" placeholder="Scanned value will appear here" required>
                
                <div class="barcode-upload-box">
                    <label for="barcodeImageInput" style="font-weight: normal; font-size: 14px; margin-bottom: 8px;">
                        📷 <strong>Scan Barcode (Camera / Photo):</strong>
                    </label>
                    <!-- capture="environment" tells iOS iPad Safari to open the back camera directly -->
                    <input type="file" id="barcodeImageInput" name="barcodeImageInput" accept="image/jpeg,image/png,image/heic" capture="environment">
                    <p id="scanStatus" style="font-size: 13px; margin: 6px 0 0 0; font-weight: bold;"></p>
                </div>
                
                <div id="reader" style="display:none;"></div>
            </div>

            <div class="form-group">
                <label for="itemName">Item Name</label>
                <input type="text" id="itemName" name="itemName" placeholder="e.g., Office Chair" required>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" value="1" min="1" required>
            </div>

            <div class="form-group">
                <label for="itemImage">Take/Upload Item Photo</label>
                <!-- capture="environment" forces camera on iPad -->
                <input type="file" id="itemImage" name="itemImage" accept="image/jpeg,image/png,image/heic" capture="environment" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">Send to Google Sheet</button>
        </form>
    </div>

    <div class="card">
        <h2>Recent Sheet Entries</h2>
        <div id="inventoryList">Loading latest rows...</div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwuDLRFUIG591U1mQs9DLfkXh9TU16nAgv77vBvLzVt5WUKhmNiHsr-G38biJ2NMs-a/exec"; 

    fetchSheetData();

    // Barcode photo scanning
    document.getElementById('barcodeImageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const statusMsg = document.getElementById('scanStatus');
        
        if (!file) return;

        statusMsg.textContent = "Processing image...";
        statusMsg.style.color = "#3498db";

        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.scanFile(file, true)
            .then(async (decodedText) => {
                document.getElementById('barcode').value = decodedText;
                statusMsg.textContent = "✓ Barcode detected!";
                statusMsg.style.color = "#27ae60";
                await lookupBarcodeOnline(decodedText);
            })
            .catch(err => {
                statusMsg.textContent = "❌ Could not read barcode. Take a photo closer to the barcode.";
                statusMsg.style.color = "#e74c3c";
            });
    });

    // Auto product name lookup
    async function lookupBarcodeOnline(barcodeNum) {
        const statusMsg = document.getElementById('scanStatus');
        const itemNameInput = document.getElementById('itemName');

        try {
            const cleanBarcode = barcodeNum.replace(/[^0-9]/g, '');
            const response = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${cleanBarcode}`);
            const data = await response.json();

            if (data.items && data.items.length > 0) {
                itemNameInput.value = data.items[0].title;
                statusMsg.textContent = `✓ Found: "${data.items[0].title}"`;
            }
        } catch (error) {
            console.warn("Lookup error:", error);
        }
    }

    // iPad Image Resizer to prevent Safari Base64 Memory Crashes
    function compressImage(file, maxWidth = 1000) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    resolve(dataUrl.split(',')[1]); 
                };
                img.onerror = (err) => reject(err);
            };
            reader.onerror = (err) => reject(err);
        });
    }

    // Submit handler
    document.getElementById('inventoryForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = "Processing & Sending...";

        const barcode = document.getElementById('barcode').value;
        const name = document.getElementById('itemName').value;
        const qty = document.getElementById('quantity').value;
        const imageFile = document.getElementById('itemImage').files[0];

        try {
            const base64String = await compressImage(imageFile, 1000);
            
            const payload = {
                barcode: barcode,
                name: name,
                quantity: qty,
                image: base64String,
                imageType: "image/jpeg"
            };

            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            document.getElementById('inventoryForm').reset();
            document.getElementById('scanStatus').textContent = "";
            alert("Item sent to Google Sheet!");
            setTimeout(fetchSheetData, 2000);
        } catch (error) {
            alert("Upload Error: " + error.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Send to Google Sheet";
        }
    });

    // Fetch sheet data
    async function fetchSheetData() {
        const listContainer = document.getElementById('inventoryList');
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();

            if (!data || data.length === 0) {
                listContainer.innerHTML = '<p>No items found in sheet.</p>';
                return;
            }

            listContainer.innerHTML = '';
            data.reverse().forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'inventory-item';
                itemDiv.innerHTML = `
                    <img src="${item.imageUrl && item.imageUrl.includes('http') ? item.imageUrl : 'https://placehold.co/80'}" alt="${item.name}">
                    <div class="item-details">
                        <strong>${item.name}</strong>
                        <p>Barcode: <code>${item.barcode}</code></p>
                        <p>Qty: ${item.quantity}</p>
                        <p><a href="${item.imageUrl}" target="_blank" style="color:#27ae60;">View Full Image</a></p>
                    </div>
                `;
                listContainer.appendChild(itemDiv);
            });
        } catch (err) {
            listContainer.innerHTML = '<p style="color:#7f8c8d;">Rows updated in Google Sheets.</p>';
        }
    }
</script>
</body>
</html>
